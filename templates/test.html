<!DOCTYPE html><html><head><title>اختبار بسيط</title></head><body><h1>اختبار الاتصال</h1><button onclick="testAPI()">جرب الاتصال</button><div id="result"></div><script> async function testAPI() { document.getElementById('result').innerHTML = 'جاري الاتصال...'; try { const response = await fetch('/seo/api/status'); const data = await response.json(); document.getElementById('result').innerHTML = '✅ نجح الاتصال: ' + JSON.stringify(data); } catch (e) { document.getElementById('result').innerHTML = '❌ فشل الاتصال: ' + e; } } </script></body></html>
